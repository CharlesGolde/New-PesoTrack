<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PesoTrack</title>
    <style>
        /* Simple Reset & Variables */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --text-color: #333333;
            --border-color: #e5e7eb;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Typography */
        h1 { margin: 0 0 20px 0; color: var(--primary); font-size: 24px; }
        h2 { margin: 25px 0 10px 0; font-size: 18px; color: #555; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        /* Layout Helpers */
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        .col { flex: 1; }

        /* Forms & Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus { border-color: var(--primary); outline: none; }

        /* Buttons */
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background-color: var(--primary);
        }
        button:hover { opacity: 0.9; }
        button.danger { background-color: var(--danger); }
        button.secondary { background-color: #6b7280; }

        /* Data Display */
        .total-box {
            background: #eff6ff;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 20px;
        }
        .total-box h3 { margin: 0; font-size: 14px; color: #666; }
        .total-box p { margin: 5px 0 0 0; font-size: 28px; font-weight: bold; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        th { color: #666; font-weight: 600; }
        .amount-col { font-family: monospace; font-weight: bold; color: var(--danger); }

        /* Reports & Lists */
        .report-list { list-style: none; padding: 0; margin: 0; }
        .report-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); }

        .savings-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #ecfdf5;
            border: 1px solid #d1fae5;
            border-radius: 4px;
        }
        .savings-box.negative {
            background-color: #fef2f2;
            border-color: #fee2e2;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Peso Track</h1>

        <!-- Total Balance -->
        <div class="total-box">
            <h3>Total Expenses</h3>
            <p>₱{{TOTAL_AMOUNT}}</p>
        </div>

        <!-- Add Form -->
        <form method="POST" action="/" class="row">
            <input type="hidden" name="action" value="add">
            <div class="col" style="flex:2"><input type="text" name="name" placeholder="Name" required></div>
            <div class="col"><input type="text" name="category" placeholder="Category" required></div>
            <div class="col"><input type="number" step="0.01" name="amount" placeholder="Amount" required></div>
            <button type="submit">Add</button>
        </form>

        <!-- Actions -->
        <div style="margin-top:10px;">
            <button type="button" class="danger" onclick="deleteSelected()">Delete Selected</button>
            <button type="button" class="secondary" onclick="clearAll()">Clear All</button>
        </div>

        <!-- Reports -->
        <h2>Category Report</h2>
        <div style="background:#f9fafb; padding:10px; border:1px solid var(--border-color); border-radius:4px;">
            <ul class="report-list">{{CATEGORY_REPORT}}</ul>
        </div>

        <!-- Savings Calculator -->
        <h2>Savings Calculator</h2>
        <form method="POST" action="/" class="row">
            <input type="hidden" name="action" value="calculate_savings">
            <div class="col"><input type="number" step="0.01" name="income" placeholder="Income" required></div>
            <button type="submit" style="background-color:var(--success);">Calculate</button>
        </form>

        <!-- Savings Result -->
        <div id="savings-result" class="savings-box {{SAVINGS_CLASS}}" style="display: {{SAVINGS_DISPLAY}};">
            <strong>{{SAVINGS_MESSAGE}}</strong>
            <div style="font-size: 20px; margin-top:5px;">Savings: ₱{{SAVINGS_AMOUNT}}</div>
        </div>

        <!-- History -->
        <h2>History</h2>
        <table>
            <thead>
                <tr>
                    <th width="30px"></th>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="transaction-list">{{TRANSACTIONS}}</tbody>
        </table>
    </div>

    <script>
        // Simple helper to create forms dynamically for actions
        function postAction(actionName, ids = []) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/';

            // Action field
            const a = document.createElement('input');
            a.type = 'hidden'; a.name = 'action'; a.value = actionName;
            form.appendChild(a);

            // IDs if present
            ids.forEach(id => {
                const i = document.createElement('input');
                i.type = 'hidden'; i.name = 'ids'; i.value = id;
                form.appendChild(i);
            });

            document.body.appendChild(form);
            form.submit();
        }

        function deleteSelected() {
            const boxes = document.querySelectorAll('input[name="delete_ids"]:checked');
            if (boxes.length === 0) return alert("Select items to delete.");
            const ids = Array.from(boxes).map(b => b.value);
            postAction('delete', ids);
        }

        function clearAll() {
            if(confirm("Clear all data?")) postAction('clear');
        }
    </script>
</body>
</html>
